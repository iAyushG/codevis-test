name: codevis analysis

on:
  pull_request:
    branches: [main, master]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install codevis
        run: |
          git clone https://github.com/iAyushG/codevis.git /tmp/codevis
          pip install networkx gitpython

      - name: Run analysis
        run: |
          cd /tmp/codevis
          python analyze.py ${{ github.workspace }}
          cp analysis.json /tmp/analysis.json

      - name: Parse results
        id: results
        run: |
          python3 - <<'EOF'
          import json, os
          with open('/tmp/analysis.json') as f:
              data = json.load(f)
          s = data.get('summary', {})
          cycles = data.get('cycles', [])
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"total_files={s.get('total_files', 0)}\n")
              out.write(f"total_deps={s.get('total_dependencies', 0)}\n")
              out.write(f"total_cycles={len(cycles)}\n")
              lines = []
              for c in cycles[:5]:
                  names = [f.split('/')[-1] for f in c.get('files', [])]
                  lines.append(' -> '.join(names) + ' -> ' + names[0])
              out.write(f"cycle_text={'|'.join(lines)}\n")
          EOF

      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            const files = '${{ steps.results.outputs.total_files }}';
            const deps = '${{ steps.results.outputs.total_deps }}';
            const cycles = parseInt('${{ steps.results.outputs.total_cycles }}' || '0');
            const cycleLines = '${{ steps.results.outputs.cycle_text }}'.split('|').filter(Boolean);

            const cycleSection = cycles === 0
              ? '> No circular dependencies detected'
              : `> **${cycles} circular dependenc${cycles === 1 ? 'y' : 'ies'} detected**\n` +
                cycleLines.map(l => '> `' + l + '`').join('\n');

            const body = [
              '## codevis analysis',
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| Files analyzed | ${files} |`,
              `| Dependencies | ${deps} |`,
              `| Circular dependencies | ${cycles === 0 ? '0' : '**' + cycles + '**'} |`,
              '',
              cycleSection,
              '',
              '_Powered by [codevis](https://github.com/iAyushG/codevis)_'
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });